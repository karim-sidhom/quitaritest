<style>
*{box-sizing:border-box; margin:0; padding:0;}
html,body{height:100%;}
body{
  font-family:'Tajawal',sans-serif;
  background:#020b2e;
  color:#f3f4fb;
  display:flex; align-items:center; justify-content:center;
  min-height:100vh;
  transition:background .4s;
  overflow:hidden;
}
body.alarm{ background:#4d0000; animation:pulse 0.8s infinite; }
@keyframes pulse{ 0%{background:#4d0000;} 50%{background:#8f0000;} 100%{background:#4d0000;} }
#trainName{
  font-size:6vw; font-weight:700; text-align:center; color:#f3f4fb; margin-bottom:6px;
}
#timeOfficial{
  font-family:'Amiri',serif; font-size:22vw; line-height:1;
  color:#ffd700; text-shadow:0 0 24px rgba(255,215,0,.35);
  text-align:center;
}
body.alarm #timeOfficial{ color:#fff; text-shadow:0 0 30px rgba(255,255,255,.6); }
#timeLive{
  font-family:'Amiri',serif; font-size:8vw; margin-top:6px;
  color:#ff8c42; text-align:center;
}
#mainWrap{
  width:100%; max-width:640px; height:94vh;
  display:flex; flex-direction:column; align-items:center;
  padding:2vh 3vw;
}
#liveBadge{
  font-size:3.2vw; color:#ff4d4d; margin-top:8px; min-height:1.2em; text-align:center;
}
body.alarm #liveBadge{ color:#fff; }
#stopsList{
  width:100%; margin-top:3vh; overflow-y:auto; flex:1;
  border-top:1px solid rgba(255,215,0,.25); padding-top:2vh;
  -webkit-overflow-scrolling:touch;
}
.stop{
  display:flex; justify-content:space-between; align-items:center;
  padding:1.4vh 1vw; font-size:3.6vw; color:#c7cbe0;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.stop-name{ text-align:right; }
.stop-time{ font-family:'Amiri',serif; color:#8f96b8; }
.stop-passed{ opacity:.35; }
.stop-current{ color:#ffd700; font-weight:700; }
.stop-current .stop-time{ color:#ffd700; }
.stop-next{ color:#ff8c42; }
.stop-next .stop-time{ color:#ff8c42; }
.stop-pos{
  background:rgba(255,77,77,.12); border-radius:8px;
  border-bottom:1px solid rgba(255,77,77,.35) !important;
  color:#ff4d4d !important; font-weight:700;
  animation:posPulse 1.6s ease-in-out infinite;
}
.stop-pos .stop-time{ color:#ff4d4d !important; }
@keyframes posPulse{ 0%,100%{opacity:1;} 50%{opacity:.6;} }
#safeMsg{
  display:none; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; margin-top:2vh; padding:3vh 4vw;
  border:1px solid rgba(120,255,170,.3); border-radius:16px;
  background:rgba(30,200,120,.08);
}
#safeMsg.show{ display:flex; }
#safeMsg .safeDist{
  font-family:'Amiri',serif; font-size:9vw; color:#7CFFB2;
  text-shadow:0 0 20px rgba(124,255,178,.35);
}
#safeMsg .safeLine{
  font-size:4.4vw; font-weight:700; color:#7CFFB2; margin-top:1.4vh;
}
#safeMsg .safeSub{
  font-size:3.4vw; color:#c7cbe0; margin-top:.6vh; opacity:.85;
}
</style>
</head>

const ZONE_RADIUS_M = 1000;     // نطاق ثابت 1 كم (بلا أي إعداد ظاهر — التطبيق تلقائي 100%)
const ALARM_RISK_THRESHOLD = 80; // العتبة التي تُطلق الصفارة (غير مستعملة الآن للصفارة، محفوظة للعرض)

// ================= géométrie =================
function haversine(a,b){
  const R=6371000, toRad=d=>d*Math.PI/180;
  const dLat=toRad(b[0]-a[0]), dLon=toRad(b[1]-a[1]);
  const s = Math.sin(dLat/2)**2 + Math.cos(toRad(a[0]))*Math.cos(toRad(b[0]))*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(s));
}
function projectT(p,a,b){
  const ax=a[1],ay=a[0], bx=b[1],by=b[0], px=p[1],py=p[0];
  const dx=bx-ax, dy=by-ay;
  const len2=dx*dx+dy*dy;
  if(len2===0) return 0;
  let t=((px-ax)*dx+(py-ay)*dy)/len2;
  return Math.max(0,Math.min(1,t));
}
function parseStops(stopsText){
  return stopsText.split(',').map(s=>s.trim()).filter(Boolean).map(pair=>{
    const idx = pair.lastIndexOf('@');
    const name = pair.slice(0,idx).trim();
    const time = pair.slice(idx+1).trim();
    const coord = STATIONS[name];
    return coord ? {name,time,lat:coord[0],lon:coord[1]} : {name,time,lat:null,lon:null,unknown:true};
  });
}
function minutesOf(hhmm){ const [h,m]=hhmm.split(':').map(Number); return h*60+m; }
function minsToHHMM(mins){ mins=((mins%1440)+1440)%1440; const h=Math.floor(mins/60), m=mins%60; return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0'); }
function minsNow(){ const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function todayAt(hhmm){
  const [h,m]=hhmm.split(':').map(Number);
  const now=new Date();
  return new Date(now.getFullYear(),now.getMonth(),now.getDate(),h,m,0);
}

// ================= SNCFT Live =================
const SNCFT_LIVE_URL = 'https://www.sncft.com.tn/wp-content/plugins/sncft-live-tracker/proxy.php';
let liveTrains = [];
let liveFetchOk = false;
let liveFetchAt = 0;
const LIVE_DATA_MAX_AGE_MS = 90*1000;
const MAX_STALE_DELAY_BUFFER_MIN = 10;
function stripAccents(s){ return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,''); }
function normName(s){ return stripAccents(s).toUpperCase().trim(); }
function stationNamesMatch(a,b){
  if(!a || !b) return false;
  const na=normName(a), nb=normName(b);
  if(!na || !nb) return false;
  return na===nb || na.includes(nb) || nb.includes(na);
}
function isLiveDataFresh(){
  return liveFetchOk && liveTrains.length>0 && (Date.now()-liveFetchAt) < LIVE_DATA_MAX_AGE_MS;
}
async function fetchLiveTrains(){
  try{
    const res = await fetch(SNCFT_LIVE_URL, {cache:'no-store'});
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    liveTrains = Array.isArray(data) ? data : [];
    liveFetchOk = true;
    liveFetchAt = Date.now();
  }catch(e){
    liveFetchOk = false;
    console.warn('SNCFT live fetch échoué (CORS ou réseau) — بالجدول فقط:', e.message);
  }
}
function extractTrainNumber(trainName){
  return (trainName||'').split('—')[0].replace(/\(.*?\)/g,'').trim();
}
function trainNumberMatches(trainName, ltNum){
  if(!ltNum) return false;
  const ours = extractTrainNumber(trainName);
  const lv = String(ltNum).trim();
  if(!ours || !lv) return false;
  return ours === lv || ours.includes(lv) || lv.includes(ours);
}
function isTrainLiveConfirmed(train){
  if(!isLiveDataFresh()) return false;
  const stops = parseStops(train.stopsText).filter(s=>!s.unknown && s.time);
  if(stops.length<2) return false;
  return liveTrains.some(lt=>{
    if(!trainNumberMatches(train.name, lt.num)) return false;
    return stops.some(s=> stationNamesMatch(s.name, lt.curFr) || stationNamesMatch(s.name, lt.nextFr));
  });
}
function getLiveDelayForTrain(train){
  if(!isLiveDataFresh()) return null;
  const stops = parseStops(train.stopsText).filter(s=>!s.unknown && s.time);
  if(stops.length<2) return null;
  const now = Date.now();
  const lastStop = stops[stops.length-1];
  let best = null;
  liveTrains.forEach(lt=>{
    const delay = Number(lt.delay)||0;
    if(delay<=0) return;
    if(!trainNumberMatches(train.name, lt.num)) return;
    const matched = stops.find(s=> stationNamesMatch(s.name, lt.curFr) || stationNamesMatch(s.name, lt.nextFr));
    if(!matched) return;
    const expectedRealArrival = todayAt(lastStop.time).getTime() + delay*60000;
    if(now > expectedRealArrival + MAX_STALE_DELAY_BUFFER_MIN*60000) return;
    if(!best || delay>best) best = delay;
  });
  return best;
}

// ================= أقرب اقتراب لكل قطار من موقعك (على كامل مساره اليوم) =================
function trainClosestApproach(userPos, train){
  const stops = parseStops(train.stopsText).filter(s=>!s.unknown && s.time);
  if(stops.length<2) return null;
  let best = null;
  for(let i=0;i<stops.length-1;i++){
    const A=[stops[i].lat,stops[i].lon], B=[stops[i+1].lat,stops[i+1].lon];
    const t = projectT(userPos, A, B);
    const px = A[0]+(B[0]-A[0])*t, py = A[1]+(B[1]-A[1])*t;
    const d = haversine(userPos,[px,py]);
    if(!best || d<best.dist){
      const tA = minutesOf(stops[i].time), tB = minutesOf(stops[i+1].time);
      best = {dist:d, timeMin: tA + t*(tB-tA), fromStation:stops[i].name, toStation:stops[i+1].name};
    }
  }
  return best;
}
function computeZoneEvents(userPos, zoneRadiusM){
  const events = [];
  trains.forEach(train=>{
    const ca = trainClosestApproach(userPos, train);
    if(!ca || ca.dist>zoneRadiusM) return;
    const risk = Math.round(Math.max(0, 1-ca.dist/RISK_THRESHOLD_M)*100);
    const timeMin = ((ca.timeMin%1440)+1440)%1440;
    events.push({train, dist:ca.dist, timeMin, fromStation:ca.fromStation, toStation:ca.toStation, risk});
  });
  events.sort((a,b)=>a.timeMin-b.timeMin);
  return events;
}
// أقرب مسافة إلى أي سكة حديدية (بصرف النظر عن نطاق البحث) — تُستعمل لعرض رسالة الأمان
function nearestRailDistanceM(userPos){
  let best = null;
  trains.forEach(train=>{
    const ca = trainClosestApproach(userPos, train);
    if(ca && (best===null || ca.dist<best)) best = ca.dist;
  });
  return best;
}
// الخطر الحقيقي الآن يعتمد على القرب الزمني من لحظة المرور أيضاً، لا على المسافة فقط
const RISK_TIME_IMMINENT_MIN = 15;
const RISK_TIME_HORIZON_MIN = 180;
function timeDecayFactor(minutesUntil){
  if(minutesUntil<=RISK_TIME_IMMINENT_MIN) return 1;
  if(minutesUntil>=RISK_TIME_HORIZON_MIN) return 0;
  return 1 - (minutesUntil-RISK_TIME_IMMINENT_MIN)/(RISK_TIME_HORIZON_MIN-RISK_TIME_IMMINENT_MIN);
}

// ================= صوت الصفارة (بلا أي زر ظاهر — تُفتح قناة الصوت تلقائياً عند أول لمسة/نقرة على الشاشة) =================
let audioCtx=null, sirenOsc=null;
function unlockAudio(){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended') audioCtx.resume();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    g.gain.value = 0.0001;
    o.connect(g).connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime+0.05);
  }catch(e){}
}
['touchstart','click','keydown'].forEach(ev=>document.addEventListener(ev, unlockAudio, {once:true, passive:true}));
function startSiren(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==='suspended'){ audioCtx.resume(); }
  if(sirenOsc) return;
  sirenOsc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  sirenOsc.type='sawtooth';
  gain.gain.value=0.5;
  sirenOsc.connect(gain).connect(audioCtx.destination);
  sirenOsc.start();
  sirenOsc._sweep = setInterval(()=>{
    if(audioCtx.state==='suspended'){ audioCtx.resume(); }
    const t=audioCtx.currentTime;
    sirenOsc.frequency.setValueAtTime(880,t);
    sirenOsc.frequency.linearRampToValueAtTime(440,t+0.4);
    sirenOsc.frequency.linearRampToValueAtTime(880,t+0.8);
  },800);
}
function stopSiren(){
  if(sirenOsc){ clearInterval(sirenOsc._sweep); sirenOsc.stop(); sirenOsc.disconnect(); sirenOsc=null; }
}
function setAlarm(active){
  if(active && !alertActive){
    alertActive=true;
    document.body.classList.add('alarm');
    startSiren();
    if(navigator.vibrate) navigator.vibrate([400,150,400,150,400,150,800]);
  } else if(!active && alertActive){
    alertActive=false;
    document.body.classList.remove('alarm');
    stopSiren();
  }
}

// ================= لائحة المحطات وموقع القطار الحي SNCFT =================
function renderStops(train, posMarker){
  const container = document.getElementById('stopsList');
  if(!container) return;
  if(!train){ container.innerHTML=''; return; }
  const stops = parseStops(train.stopsText);
  let liveMatch = null;
  if(isLiveDataFresh()){
    liveMatch = liveTrains.find(lt => trainNumberMatches(train.name, lt.num) &&
      stops.some(s => stationNamesMatch(s.name, lt.curFr) || stationNamesMatch(s.name, lt.nextFr)));
  }
  let currentIdx = -1;
  if(liveMatch){
    currentIdx = stops.findIndex(s => stationNamesMatch(s.name, liveMatch.curFr));
    if(currentIdx===-1){
      const nextIdx = stops.findIndex(s => stationNamesMatch(s.name, liveMatch.nextFr));
      if(nextIdx>0) currentIdx = nextIdx-1;
    }
  }
  // نطبّق تأخير SNCFT Live (إن وُجد ومؤكَّد) على توقيت كل محطة في اللائحة — التوقيت الحيّ يعوّض التوقيت النظري بالكامل
  const delay = isTrainLiveConfirmed(train) ? (getLiveDelayForTrain(train) || 0) : 0;
  const now = minsNow();
  const rows = [];
  stops.forEach((s,i)=>{
    let cls='stop';
    if(currentIdx>=0){
      if(i<currentIdx) cls+=' stop-passed';
      else if(i===currentIdx) cls+=' stop-current';
      else if(i===currentIdx+1) cls+=' stop-next';
    } else if(s.time && minutesOf(s.time) < now){
      cls+=' stop-passed';
    }
    const dispTime = (s.time && delay>0) ? minsToHHMM(minutesOf(s.time)+delay) : s.time;
    rows.push('<div class="'+cls+'"><span class="stop-name">'+s.name+'</span><span class="stop-time">'+dispTime+'</span></div>');
    // إدراج محطة افتراضية لموقعك الحالي مباشرة بعد المحطة التي سبقته على مسار القطار
    if(posMarker && s.name===posMarker.fromStation && stops[i+1] && stops[i+1].name===posMarker.toStation){
      const posTime = minsToHHMM(Math.round(posMarker.timeMin));
      rows.push('<div class="stop stop-pos"><span class="stop-name">📍 موقع سيادتكم</span><span class="stop-time">'+posTime+'</span></div>');
    }
  });
  container.innerHTML = rows.join('');
}

// ================= الحلقة التلقائية =================
// الوقت الفعّال لعبور القطار من نقطة موقعك: التوقيت الحقيقي (SNCFT Live) إن وُجد، وإلا التوقيت النظري
function getEffectiveTimeMin(train, timeMinRaw){
  const delay = isTrainLiveConfirmed(train) ? (getLiveDelayForTrain(train) || 0) : 0;
  return (((timeMinRaw + delay) % 1440) + 1440) % 1440;
}

function showSafeMessage(userPos){
  const el = document.getElementById('safeMsg');
  const elDist = document.getElementById('safeDist');
  if(!el || !elDist) return;
  const distM = nearestRailDistanceM(userPos);
  if(distM===null){
    el.classList.remove('show');
    return;
  }
  const km = (distM/1000).toFixed(distM<10000?1:0);
  elDist.textContent = km + ' كم';
  el.classList.add('show');
}
function hideSafeMessage(){
  const el = document.getElementById('safeMsg');
  if(el) el.classList.remove('show');
}

function computeAndRender(){
  const elName = document.getElementById('trainName');
  const elOfficial = document.getElementById('timeOfficial');
  const elLive = document.getElementById('timeLive');
  const elBadge = document.getElementById('liveBadge');
  if(!lastPos){
    elName.textContent=''; elOfficial.textContent='--:--'; elLive.textContent='';
    if(elBadge) elBadge.textContent='';
    lockedTrain = null; renderStops(null); setAlarm(false); hideSafeMessage(); return;
  }

  const events = computeZoneEvents(lastPos, ZONE_RADIUS_M);
  const now = minsNow();

  // -------- تثبيت القطار المعروض: لا يتغيّر الجدول حتى يصل القطار فعلياً إلى المحطة التي تلي موقعك على مساره --------
  let next = null;
  if(lockedTrain){
    const ca = trainClosestApproach(lastPos, lockedTrain);
    if(ca){
      const stopsL = parseStops(lockedTrain.stopsText).filter(s=>!s.unknown && s.time);
      // المحطة "التالية" بالنسبة لموقعك = المحطة التي تلي نقطة أقرب اقتراب على مسار القطار
      const toStop = stopsL.find(s=>s.name===ca.toStation) || stopsL[stopsL.length-1];
      const toStopTimeMin = minutesOf(toStop.time);
      const effectiveToStopTimeMin = getEffectiveTimeMin(lockedTrain, toStopTimeMin);
      // القطار "تجاوز" موقعك فقط إذا وصل فعلياً (نظرياً أو حقيقياً) إلى تلك المحطة التالية
      let minutesPastArrival = now - effectiveToStopTimeMin;
      if(minutesPastArrival < -720) minutesPastArrival += 1440; // عبور منتصف الليل
      if(minutesPastArrival > 720) minutesPastArrival -= 1440;
      const passed = minutesPastArrival >= 0;
      if(passed){
        lockedTrain = null;
      } else {
        const timeMin = ((ca.timeMin%1440)+1440)%1440;
        const effectiveTimeMin = getEffectiveTimeMin(lockedTrain, timeMin);
        const risk = Math.round(Math.max(0, 1-ca.dist/RISK_THRESHOLD_M)*100);
        next = {train:lockedTrain, dist:ca.dist, timeMin, effectiveTimeMin, fromStation:ca.fromStation, toStation:ca.toStation, risk};
      }
    } else {
      lockedTrain = null;
    }
  }
  if(!next){
    const candidate = events.find(e=>e.timeMin>=now);
    if(candidate){
      lockedTrain = candidate.train;
      next = {...candidate, effectiveTimeMin:getEffectiveTimeMin(candidate.train, candidate.timeMin)};
    }
  }

  if(!next){
    elName.textContent=''; elOfficial.textContent='--:--'; elLive.textContent='';
    if(elBadge) elBadge.textContent='';
    renderStops(null); setAlarm(false);
    showSafeMessage(lastPos);
    return;
  }

  hideSafeMessage();
  elName.textContent = next.train.name;
  const liveConfirmed = isTrainLiveConfirmed(next.train);
  const displayTxt = minsToHHMM(Math.round(next.effectiveTimeMin));
  // التوقيت الحيّ (إن تأكّد) يعوّض التوقيت النظري بالكامل في الواجهة الرئيسية
  elOfficial.textContent = displayTxt;
  elLive.textContent = '';
  if(elBadge) elBadge.textContent = liveConfirmed ? '🔴 متابعة مباشرة SNCFT' : '';

  renderStops(next.train, {fromStation:next.fromStation, toStation:next.toStation, timeMin:next.effectiveTimeMin});

  // -------- الصفارة: تشتعل فقط عند تحقق الشرطين معاً: القرب من السكة (أقل من 150م) + حلول توقيت العبور (النظري أو الحقيقي) --------
  const distanceOk = next.dist <= RISK_THRESHOLD_M;
  let minutesPastArrival2 = now - next.effectiveTimeMin;
  if(minutesPastArrival2 < -720) minutesPastArrival2 += 1440;
  if(minutesPastArrival2 > 720) minutesPastArrival2 -= 1440;
  const timeArrived = minutesPastArrival2 >= 0;
  setAlarm(distanceOk && timeArrived);
}

// ================= géolocalisation تلقائية بلا أي زر =================
if(navigator.geolocation){
  navigator.geolocation.watchPosition(pos=>{
    lastPos = [pos.coords.latitude, pos.coords.longitude];
    computeAndRender();
  }, err=>{ console.warn('GPS error', err.message); }, {enableHighAccuracy:true, maximumAge:5000, timeout:15000});
}

fetchLiveTrains();
setInterval(fetchLiveTrains, 30000);
setInterval(computeAndRender, 5000);

// ---------- service worker (installability + offline shell cache) ----------
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE_NAME = 'qitaritest-shell-v1';
    self.addEventListener('install', e => {
      self.skipWaiting();
      e.waitUntil(
        caches.open(CACHE_NAME).then(cache => cache.add(self.registration.scope).catch(()=>{}))
      );
    });
    self.addEventListener('activate', e => {
      self.clients.claim();
      e.waitUntil(
        caches.keys().then(keys => Promise.all(
          keys.filter(k => k !== CACHE_NAME).map(k => caches.delete(k))
        ))
      );
    });
    self.addEventListener('fetch', e => {
      if (e.request.method !== 'GET') return;
      e.respondWith(
        caches.match(e.request).then(cached => {
          const fetchPromise = fetch(e.request).then(networkResponse => {
            if (networkResponse && networkResponse.ok) {
              const clone = networkResponse.clone();
              caches.open(CACHE_NAME).then(cache => cache.put(e.request, clone));
            }
            return networkResponse;
          }).catch(() => cached);
          return cached || fetchPromise;
        })
      );
    });
  `;
  const blob = new Blob([swCode],{type:'application/javascript'});
  navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
}
</script>
